<div class="flex scroll-mt-24 items-stretch pb-8 text-[1.05rem] sm:text-[15px] xl:w-full">
  <section [class]="'flex min-w-0 flex-1 flex-col ' + (activeAnchor() ? '' : 'xl:mx-auto xl:max-w-4xl')">
    <div class="h-(--top-spacing) shrink-0"></div>
    <div
      class="mx-auto flex w-full max-w-[40rem] min-w-0 flex-1 flex-col gap-6 px-4 py-6 text-neutral-800 md:px-0 lg:py-8 dark:text-neutral-300"
    >
      <ng-content></ng-content>
    </div>
  </section>

  @if (navigationConfig()) {
    <z-dynamic-anchor
      [navigation]="navigationConfig()"
      [activeAnchor]="activeAnchor()"
      [onAnchorClick]="onAnchorClick()"
    ></z-dynamic-anchor>
  } @else {
    <div class="hidden w-72 xl:block"></div>
  }
</div>
