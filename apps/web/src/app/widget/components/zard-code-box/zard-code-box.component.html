<section class="mb-10">
  @if (componentType()) {
    <h3 class="font-heading my-4 scroll-m-28 text-lg font-medium tracking-tight first-letter:uppercase">
      {{ componentType()! | hyphenToSpace }}
    </h3>
  }
  @if (demoDescription()) {
    <p class="my-4 leading-relaxed first-letter:uppercase">
      {{ demoDescription()! }}
    </p>
  }

  @if (fullScreen()) {
    @if (dynamicComponent()) {
      <ng-container *ngComponentOutlet="dynamicComponent() ?? null"></ng-container>
    }
  } @else {
    <div
      class="group/code-box relative flex flex-col overflow-hidden rounded-xl border"
      [class.mb-12]="!onlyDemo() && codeData()"
    >
      <div
        class="preview relative flex min-h-72 w-full justify-center p-6 md:p-10"
        [class.items-center]="flexAlign() === 'center'"
        [class.items-start]="flexAlign() === 'start'"
        [class.items-end]="flexAlign() === 'end'"
        [class.flex-col]="column()"
        [class.gap-4]="true"
      >
        @if (dynamicComponent()) {
          <ng-container *ngComponentOutlet="dynamicComponent() ?? null"></ng-container>
        }
      </div>

      @if (!onlyDemo() && codeBlockData(); as code) {
        <div
          class="relative border-t"
          [class.overflow-hidden]="codeCollapsed()"
          [class.max-h-32]="codeCollapsed()"
          [class.max-h-96]="!codeCollapsed()"
          [class.no-scrollbar]="!codeCollapsed()"
          [class.overflow-x-auto]="!codeCollapsed()"
          [class.overflow-y-auto]="!codeCollapsed()"
          [class.overscroll-y-auto]="!codeCollapsed()"
          [class.overscroll-x-contain]="!codeCollapsed()"
        >
          <z-code-block [data]="code" [embedded]="true" />

          @if (codeCollapsed()) {
            <div
              class="from-code via-code/70 absolute inset-0 flex items-center justify-center bg-gradient-to-t to-transparent"
            >
              <button
                type="button"
                class="bg-background text-foreground hover:bg-muted dark:bg-background dark:text-foreground dark:hover:bg-muted relative z-10 cursor-pointer rounded-lg border px-4 py-1.5 text-sm font-medium shadow-sm"
                (click)="codeCollapsed.set(false)"
              >
                View Code
              </button>
            </div>
          } @else {
            <z-copy-button
              [code]="codeData()!.code"
              class="text-muted-foreground hover:bg-muted/80 focus-visible:ring-ring bg-code absolute top-3 right-3 z-20 flex h-7 w-7 cursor-pointer items-center justify-center rounded-md transition-all duration-200 ease-in-out focus-visible:ring-2 focus-visible:outline-none"
            />
          }
        </div>
      }
    </div>
  }
</section>
